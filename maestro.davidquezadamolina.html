<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exploración Contemporánea | ASIFIM</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css"/>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
}

.container{
    max-width:900px;
    margin:auto;
    padding:60px 20px;
}

h1{
    font-size:42px;
    letter-spacing:3px;
    margin-bottom:10px;
}

.subtitle{
    font-size:16px;
    letter-spacing:2px;
    opacity:0.7;
    margin-bottom:40px;
}

.section{
    margin-top:70px;
}

.section h2{
    font-size:24px;
    letter-spacing:2px;
    margin-bottom:20px;
    border-bottom:1px solid #333;
    padding-bottom:10px;
}

p{
    font-size:16px;
    line-height:1.7;
    opacity:0.9;
    margin-bottom:20px;
}

/* BASE */
.swiper{
    width:100%;
    max-width:560px;
    margin:50px auto;
}

.swiper-slide{
    display:flex;
    justify-content:center;
    align-items:center;
}

/* PRINCIPAL */
.swiper-main{
    height:320px;
}

.swiper-main img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:12px;
}

/* CERTIFICADOS (vertical visual pero horizontal real) */
.swiper-vertical{
    height:500px;
}

.swiper-vertical img{
    max-height:100%;
    max-width:100%;
    object-fit:contain;
}

/* HORIZONTAL */
.swiper-horizontal{
    height:320px;
}

.swiper-horizontal img{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
}

.footer{
    margin-top:90px;
    text-align:center;
    font-size:12px;
    letter-spacing:2px;
    opacity:0.6;
}

a{
    color:white;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

<h1>David<br>Quezada Molina</h1>
<div class="subtitle">
Director · Administrador · ASIFIM
</div>

<!-- CARRUSEL PRINCIPAL -->
<div class="swiper swiper-main">
<div class="swiper-wrapper">

<script src="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.js"></script>

<script>

const config = {
loop:true,
speed:800,
autoplay:{
delay:2500,
disableOnInteraction:false
},
grabCursor:true,
slidesPerView:1,
centeredSlides:true,
spaceBetween:20,
loopedSlides:10,
observer:true,
observeParents:true
};

new Swiper('.swiper-main',{
...config,
pagination:{
el:'.swiper-main .swiper-pagination',
clickable:true
}
});

new Swiper('.swiper-vertical',{
...config,
direction:'horizontal',
pagination:{
el:'.swiper-vertical .swiper-pagination',
clickable:true
}
});

new Swiper('.swiper-horizontal',{
...config,
pagination:{
el:'.swiper-horizontal .swiper-pagination',
clickable:true
}
});

</script>
